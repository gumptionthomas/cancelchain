<!-- @dsCard group="Brand" viewport="700x170" name="Wax seal & kind labels" subtitle="Neutral→gold verification seal; support/oppose labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--paper); }
  .row { display: flex; align-items: center; gap: 30px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
  .labels { display: flex; flex-direction: column; gap: 6px; font-size: 18px; }
</style>
</head>
<body class="theme-2b2f">
  <div class="row">
    <div class="item"><div class="seal-dot">&#10003;</div><div class="cap">unverified (stone)</div></div>
    <div class="item"><div class="seal-dot verified">&#10003;</div><div class="cap">verified (gold)</div></div>
    <div class="labels">
      <span><span class="kind-support">support</span> — a commendation</span>
      <span><span class="kind-opposition">opposition</span> — a grievance</span>
    </div>
  </div>
</body>
</html>
