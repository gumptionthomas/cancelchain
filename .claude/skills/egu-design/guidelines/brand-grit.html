<!-- @dsCard group="Brand" viewport="700x200" name="GRIT currency mark" subtitle="The unit of value on GumptionChain — struck gold hex token" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--paper); }
  .row { display: flex; align-items: center; gap: 34px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--muted-gold); }
  .dark { background: var(--ticker-bg); border-radius: 10px; padding: 16px; }
  .txt { max-width: 30ch; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .txt b { color: var(--gold-deep); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><img src="../assets/grit-glyph.svg" alt="GRIT" style="width:96px;height:96px"><div class="cap">grit-glyph.svg</div></div>
    <div class="item"><div class="dark"><img src="../assets/grit-glyph.svg" alt="GRIT on dark" style="width:64px;height:64px"></div><div class="cap">on dark</div></div>
    <div class="item"><img src="../assets/grit-glyph-mono.svg" alt="GRIT mono" style="width:64px;height:64px"><div class="cap">grit-glyph-mono.svg</div></div>
    <p class="txt"><b>GRIT</b> is the unit of value on GumptionChain — 100 grains to a grit. A struck, flat-top hex token; the geometric “G” is a chunked torus + a horizontal tube, echoing the Gumption logo.</p>
  </div>
</body>
</html>
