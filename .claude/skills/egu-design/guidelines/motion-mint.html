    const { GritMint } = window.ExtendedGumptionUniverseDesignSystem_a80556;
    function Loop({ children, every = 3000 }) {
      const [k, setK] = React.useState(0);
      React.useEffect(() => { const id = setInterval(() => setK((x) => x + 1), every); return () => clearInterval(id); }, []);
      return React.cloneElement(children, { key: k });
    }
    function Demo() {
      return (
        <div>
          <div className="row">
            <div className="toast"><Loop><GritMint amount={12} animate={true} /></Loop></div>

        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
