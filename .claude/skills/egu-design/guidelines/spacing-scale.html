<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="0.25rem rhythm (Bootstrap-parity steps)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--paper); }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--gold); border-radius: var(--radius-sm); width: 26px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body class="theme-2b2f">
  <div class="scale">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">1 · 4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2 · 8</div></div>
    <div class="item"><div class="bar" style="height:13.6px"></div><div class="n">3 · 13.6</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4 · 16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="n">5 · 20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">6 · 24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">8 · 32</div></div>
  </div>
</body>
</html>
