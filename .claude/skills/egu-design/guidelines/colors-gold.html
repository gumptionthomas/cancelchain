<!-- @dsCard group="Colors" viewport="700x150" name="Gold — the brand spine" subtitle="Gold leaf, wax seals, ledger rules" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--rule); }
  .chip { height: 70px; }
  .meta { padding: 7px 9px; background: var(--paper-card); }
  .name { font-family: var(--font-display); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--gold-deep); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
</style>
</head>
<body class="theme-2b2f">
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold-deep)"></div><div class="meta"><div class="name">gold-deep</div><div class="hex">#6b5608</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-dark)"></div><div class="meta"><div class="name">gold-dark</div><div class="hex">#b8960c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="meta"><div class="name">gold</div><div class="hex">#d4a520</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-light)"></div><div class="meta"><div class="name">gold-light</div><div class="hex">#e8c547</div></div></div>
  </div>
</body>
</html>
