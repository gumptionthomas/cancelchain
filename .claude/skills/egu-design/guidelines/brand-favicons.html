<!-- @dsCard group="Brand" viewport="700x190" name="Favicons — node & hub" subtitle="Green G node (chain) · gold constellation (the EGU)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--paper); }
  .row { display: flex; align-items: center; gap: 40px; }
  .grp { display: flex; flex-direction: column; gap: 10px; }
  .sizes { display: flex; align-items: flex-end; gap: 14px; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .lab { font-family: var(--font-mono); font-size: 9px; color: var(--muted-gold); }
  .cap { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .04em; color: var(--gold-deep); font-size: .8rem; }
</style>
</head>
<body>
  <div class="row">
    <div class="grp">
      <span class="cap">Base node · gumptionchain</span>
      <div class="sizes">
        <div class="s"><img src="../assets/favicon-node.svg" width="64" height="64" alt=""><span class="lab">64</span></div>
        <div class="s"><img src="../assets/favicon-node.svg" width="32" height="32" alt=""><span class="lab">32</span></div>
        <div class="s"><img src="../assets/favicon-node.svg" width="16" height="16" alt=""><span class="lab">16</span></div>
      </div>
    </div>
    <div class="grp">
      <span class="cap">Hub · the EGU</span>
      <div class="sizes">
        <div class="s"><img src="../assets/favicon-hub.svg" width="64" height="64" alt=""><span class="lab">64</span></div>
        <div class="s"><img src="../assets/favicon-hub.svg" width="32" height="32" alt=""><span class="lab">32</span></div>
        <div class="s"><img src="../assets/favicon-hub.svg" width="16" height="16" alt=""><span class="lab">16</span></div>
      </div>
    </div>
  </div>
</body>
</html>
