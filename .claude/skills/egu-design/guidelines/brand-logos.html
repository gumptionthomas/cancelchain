<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--paper); }
  .row { display: flex; align-items: center; gap: 40px; }
  .g { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .g img { height: 96px; object-fit: contain; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style>
</head>
<body class="theme-2b2f">
  <div class="row">
    <div class="g"><img src="../assets/gumption-g.png" alt="Gumption G"><div class="cap">gumption-g.png</div></div>
    <div class="g"><img src="../assets/tbtf-logo.svg" alt="Too Big To Fail" style="height:120px"><div class="cap">tbtf-logo.svg</div></div>
  </div>
</body>
</html>
