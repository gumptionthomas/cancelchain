<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Chain Explorer Page" description="A vanilla Bootstrap 5 gumptionchain explorer page (stat tiles, recent blocks, subjects). Themed only by content + green/red semantics; add class=\"theme-2b2f\" to the wrapper to paint the gold hub skin." -->
<helmet>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon-node.svg">
  <script src="./ds-base.js"></script>
</helmet>
<div style="min-height:100vh;background:#fff">
  <nav class="navbar border-bottom" style="padding:.6rem 1.5rem;display:flex;gap:.5rem;align-items:center">
    <span class="navbar-brand" style="font-weight:600">GumptionChain</span>
    <a href="#" class="nav-link" style="padding:.4rem .6rem">Blocks</a>
    <a href="#" class="nav-link" style="padding:.4rem .6rem">Subjects</a>
    <a href="#" class="nav-link" style="padding:.4rem .6rem">Verify</a>
  </nav>

  <div class="container-fluid">
    <div class="row my-3 g-3">
      <div class="col-6 col-md"><x-import component-from-global-scope="ExtendedGumptionUniverseDesignSystem_a80556.StatCard" label="Height" value="184,213" hint-size="100%,110px"></x-import></div>
      <div class="col-6 col-md"><x-import component-from-global-scope="ExtendedGumptionUniverseDesignSystem_a80556.StatCard" label="Transactions" value="9,604" hint-size="100%,110px"></x-import></div>
      <div class="col-6 col-md"><x-import component-from-global-scope="ExtendedGumptionUniverseDesignSystem_a80556.StatCard" label="Total staked" value="2,794" unit="grains" hint-size="100%,110px"></x-import></div>
      <div class="col-6 col-md"><x-import component-from-global-scope="ExtendedGumptionUniverseDesignSystem_a80556.StatCard" label="Subjects" value="38" hint-size="100%,110px"></x-import></div>
    </div>

    <div class="row my-3"><div class="col">
      <div class="card bg-light"><div class="card-body">
        <div class="card-title h5">Recent Blocks</div>
        <table class="table table-hover mt-3">
          <thead><tr><th>#</th><th>Hash</th><th>Timestamp</th><th>Txns</th></tr></thead>
          <tbody class="font-monospace">
            <sc-for list="{{ blocks }}" as="b" hint-placeholder-count="4">
              <tr>
                <td>{{ b.idx }}</td>
                <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0"><a href="#">{{ b.hash }}</a></td>
                <td>{{ b.ts }}</td>
                <td>{{ b.txns }}</td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div></div>
    </div></div>

    <div class="row my-3"><div class="col">
      <div class="card bg-light"><div class="card-body">
        <div class="card-title h5">Subjects</div>
        <table class="table table-hover mt-3">
          <thead><tr><th>Subject</th><th>Opposition</th><th>Support</th><th>Net</th></tr></thead>
          <tbody>
            <sc-for list="{{ subjects }}" as="s" hint-placeholder-count="4">
              <tr>
                <td><a href="#">{{ s.subject }}</a></td>
                <td>{{ s.opposition }}</td>
                <td>{{ s.support }}</td>
                <td><x-import component-from-global-scope="ExtendedGumptionUniverseDesignSystem_a80556.NetStance" support="{{ s.support }}" opposition="{{ s.opposition }}" hint-size="6rem,1.2rem"></x-import></td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div></div>
    </div></div>
  </div>

  <div class="text-center text-muted" style="padding:1.5rem 0;font-size:.85rem">Version 0.9.2 &middot; <a href="#">gumption.com/chain</a></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      blocks: [
        { idx: '184,213', hash: '00000a3f9c1e8b2d7a4f06e5c9b81d3f2a7e0c4b6d8f1a9e3c5b7d0f2a4e6c8b', ts: '2026-06-13 14:02:11', txns: 3 },
        { idx: '184,212', hash: '00000c7d2e9a1f4b8c6035d7e1a9b3f5c2d8e4a06b1f7c9d3e5a7b09c1d3f5e7', ts: '2026-06-13 13:51:44', txns: 1 },
        { idx: '184,211', hash: '00000f1a8c3e9b2d5074a6f8c1e3b5d7029a4c6e8b0d2f4a6c8e0b2d4f6a8c0e', ts: '2026-06-13 13:40:09', txns: 5 },
        { idx: '184,210', hash: '000004b9d2f7a1c8e3650b9d7f1a3c5e7029b4d6f8a0c2e4b6d8f0a2c4e6b8d0', ts: '2026-06-13 13:28:55', txns: 2 },
      ],
      subjects: [
        { subject: 'Local Library', opposition: 160, support: 420 },
        { subject: 'City Budget', opposition: 620, support: 850 },
        { subject: 'Toll Road', opposition: 940, support: 120 },
        { subject: 'Night Market', opposition: 50, support: 1200 },
      ],
    };
  }
}
</script>
</body>
</html>
